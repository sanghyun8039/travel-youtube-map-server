name: Deploy to Raspberry Pi

on:
  push:
    branches: ["main"] # main 브랜치에 푸시될 때 실행

jobs:
  build-and-deploy:
    runs-on: self-hosted # ⭐ 라즈베리파이에서 직접 실행된다는 뜻!

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 환경변수 파일(.env) 생성
        # 보안을 위해 GitHub Secrets 활용
        run: |
          # DB 설정
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER || 'postgres' }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'pi' }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB || 'travel_youtube_map' }}" >> .env
          # 도커 네트워크 내부에서는 서비스 이름인 'postgres'를 사용해야 함
          echo "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'postgres' }}:${{ secrets.POSTGRES_PASSWORD || 'pi' }}@postgres:5432/${{ secrets.POSTGRES_DB || 'travel_youtube_map' }}?schema=public" >> .env

          # 서버 기본 설정
          echo "PORT=3001" >> .env
          echo "NODE_ENV=production" >> .env
          echo "FRONTEND_URL=https://tubeway.vercel.app" >> .env

          # JWT
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

          # # 카카오 OAuth
          # echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
          # echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
          # echo "KAKAO_CALLBACK_URL=${{ secrets.KAKAO_CALLBACK_URL }}" >> .env

          # # 네이버 OAuth
          # echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          # echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env
          # echo "NAVER_CALLBACK_URL=${{ secrets.NAVER_CALLBACK_URL }}" >> .env

          # 구글 OAuth
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}" >> .env

      - name: 기존 수동 컨테이너 중지 (있는 경우)
        # 이전에 docker run 명령어로 띄웠던 컨테이너와 이름이 겹칠 수 있으므로 정리
        continue-on-error: true
        run: |
          docker stop travel-youtube-map-server || true
          docker rm travel-youtube-map-server || true

      - name: 서버 배포 (docker-compose)
        # docker compose(V2)를 우선 시도하고, 없으면 docker-compose(V1) 사용
        run: |
          if docker compose version > /dev/null 2>&1; then
            docker compose up -d --build
          else
            docker-compose up -d --build
          fi
